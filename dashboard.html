<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>داشبورد پیشرفته بلاکر توییتر</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel-bg: #ffffff;
      --hover-bg: #f9fafb;
      --text-primary: #1f2937;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --border: #d1d5db;
      --border-light: #e5e7eb;
      --accent: #e11d48;
      --accent-hover: #be123c;
      --success: #10b981;
      --success-hover: #059669;
    }
    html[data-theme="dark"] {
      --bg: #0f172a;
      --panel-bg: #1f2937;
      --hover-bg: #273449;
      --text-primary: #f3f4f6;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      --border: #374151;
      --border-light: #374151;
      --accent: #e11d48;
      --accent-hover: #fb7185;
      --success: #10b981;
      --success-hover: #34d399;
    }
    @font-face {
      font-family: 'B Koodak';
      src: local('B Koodak'), local('BKoodak'), local('B_Koodak');
    }
    body {
      font-family: 'B Koodak', Tahoma, sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      transition: background-color 0.2s;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      margin-bottom: 20px;
      gap: 10px;
    }
    .header-row h2 {
      margin: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    #langToggle, #themeToggleBtn {
      background-color: var(--text-primary);
      color: var(--panel-bg);
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      font-family: Tahoma, sans-serif;
    }
    #langToggle:hover, #themeToggleBtn:hover {
      opacity: 0.85;
    }
    html[dir="ltr"] .container {
      text-align: left;
    }
    html[dir="ltr"] #searchInput,
    html[dir="ltr"] textarea {
      direction: ltr;
      text-align: left;
    }
    html[dir="ltr"] .search-item {
      text-align: left;
    }
    html[dir="ltr"] .search-item .user-info {
      text-align: left;
    }
    .container {
      width: 100%;
      max-width: 860px;
      background: var(--panel-bg);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: background-color 0.2s;
    }
    h2 {
      margin-top: 0;
      color: var(--text-primary);
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      font-size: 20px;
    }
    h3 {
      color: var(--text-primary);
      font-size: 14px;
      margin: 22px 0 10px 0;
    }
    .field-group {
      margin-bottom: 20px;
      position: relative;
    }
    label {
      font-size: 13px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    #searchInput {
      width: 97%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: var(--panel-bg);
      color: var(--text-primary);
    }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1);
    }
    /* منوی نتایج جستجوی تمام صفحه */
    .search-dropdown {
      position: absolute;
      top: 75px;
      left: 0;
      right: 0;
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      max-height: 350px;
      overflow-y: auto;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      z-index: 100;
      display: none;
    }
    .search-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.2s;
    }
    .search-item:hover {
      background-color: var(--hover-bg);
    }
    .search-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .search-item img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .search-item .user-info {
      display: flex;
      flex-direction: column;
      text-align: right;
    }
    .search-item .name {
      font-size: 13px;
      font-weight: bold;
      color: var(--text-primary);
    }
    .search-item .handle {
      font-size: 12px;
      color: var(--text-muted);
    }
    .add-selected-btn {
      width: calc(100% - 40px);
      margin: 15px 20px;
      background-color: var(--success);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      font-family: Tahoma;
      text-align: center;
    }
    .add-selected-btn:hover {
      background-color: var(--success-hover);
    }
    textarea {
      width: 97%;
      height: 180px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      resize: vertical;
      font-family: monospace;
      background: var(--panel-bg);
      color: var(--text-primary);
    }
    .row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .row > div {
      flex: 1;
    }
    input[type="number"] {
      width: 94%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--panel-bg);
      color: var(--text-primary);
    }
    .btn-file {
      border: 1px dashed var(--text-secondary);
      color: var(--text-secondary);
      background-color: var(--panel-bg);
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
      display: block;
      text-align: center;
      cursor: pointer;
    }
    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }
    .file-input-wrapper input[type=file] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab-nav button {
      flex: 1;
      min-width: 120px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      font-family: 'B Koodak', Tahoma, sans-serif;
      cursor: pointer;
    }
    .tab-nav button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .idfinder-row {
      display: flex;
      gap: 10px;
    }
    .idfinder-row input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: var(--panel-bg);
      color: var(--text-primary);
    }
    .idfinder-row button {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      font-family: 'B Koodak', Tahoma, sans-serif;
      white-space: nowrap;
    }
    .idfinder-row button:hover {
      background-color: var(--accent-hover);
    }
    .idfinder-result {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      background: var(--hover-bg);
      display: none;
    }
    .idfinder-result .row-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 14px;
    }
    .idfinder-result .row-line b {
      color: var(--text-primary);
    }
    .idfinder-result .copy-btn {
      background: var(--text-primary);
      color: var(--panel-bg);
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .btn {
      width: 100%;
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }
    .btn:hover {
      background-color: var(--accent-hover);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-secondary {
      width: 100%;
      background-color: var(--panel-bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      font-family: 'B Koodak', Tahoma, sans-serif;
      margin-top: 10px;
    }
    .btn-secondary:hover {
      background-color: var(--hover-bg);
      border-color: var(--text-muted);
    }
    .btn-outline-danger {
      width: 100%;
      background-color: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      font-family: 'B Koodak', Tahoma, sans-serif;
      margin-top: 10px;
    }
    .btn-outline-danger:hover {
      background-color: var(--accent);
      color: white;
    }
    select, .theme-select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'B Koodak', Tahoma, sans-serif;
      background-color: var(--panel-bg);
      color: var(--text-primary);
      cursor: pointer;
    }
    /* رفع مشکل فونت اعداد لاتین: در حالت انگلیسی، آیدی عددی نباید با فونت فارسی رندر شود */
    html[dir="ltr"] .idfinder-result,
    html[dir="ltr"] .idfinder-result * {
      font-family: Tahoma, Arial, sans-serif;
      direction: ltr;
    }
    .blockedlist-status {
      font-size: 12px;
      color: var(--text-muted);
      min-height: 16px;
      margin-bottom: 8px;
    }
    .blockedlist-toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .blockedlist-toolbar input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--panel-bg);
      color: var(--text-primary);
      min-width: 160px;
    }
    .blockedlist-table-wrapper {
      overflow-x: auto;
      margin: 14px 0;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      max-height: 420px;
      overflow-y: auto;
    }
    table.blockedlist-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 680px;
    }
    table.blockedlist-table th,
    table.blockedlist-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-light);
      text-align: right;
      vertical-align: top;
    }
    html[dir="ltr"] table.blockedlist-table th,
    html[dir="ltr"] table.blockedlist-table td {
      text-align: left;
    }
    table.blockedlist-table thead th {
      background-color: var(--hover-bg);
      position: sticky;
      top: 0;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }
    table.blockedlist-table thead th:hover {
      color: var(--accent);
    }
    table.blockedlist-table td:nth-child(4) {
      font-family: Tahoma, Arial, sans-serif;
      direction: ltr;
      text-align: left;
    }
    table.blockedlist-table td:nth-child(5) {
      color: var(--text-muted);
      max-width: 320px;
    }
    table.blockedlist-table input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .preview-box {
      margin: -8px 0 16px 0;
      padding: 12px 14px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      display: none;
    }
    .preview-box div { margin-bottom: 3px; }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }
    .settings-row label {
      margin-bottom: 0;
    }
    .settings-row select {
      width: auto;
      min-width: 160px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .checkbox-row label {
      margin-bottom: 0;
      cursor: pointer;
    }
    .settings-saved-note {
      font-size: 12px;
      color: var(--success);
      min-height: 16px;
      margin-top: -8px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h2 data-i18n="dashboardTitle">داشبورد بلاک دسته‌جمعی توییتر</h2>
      <div class="header-actions">
        <button id="themeToggleBtn" type="button">🌙</button>
        <button id="langToggle" type="button">EN</button>
      </div>
    </div>

    <div class="tab-nav">
      <button id="tabBtnBlock" class="active" type="button" data-i18n="tabBlock">بلاک دسته‌جمعی</button>
      <button id="tabBtnUnblock" type="button" data-i18n="tabUnblock">آنبلاک دسته‌جمعی</button>
      <button id="tabBtnIdFinder" type="button" data-i18n="tabIdFinder">دریافت آیدی از یوزرنیم</button>
      <button id="tabBtnBlockedList" type="button" data-i18n="tabBlockedList">لیست بلاک‌شده‌ها</button>
      <button id="tabBtnSettings" type="button" data-i18n="tabSettings">تنظیمات</button>
    </div>

    <div id="tabBlockPanel">
    <div class="field-group">
      <label data-i18n="searchLabel">جستجو و تیک زدن اکانت‌ها (نمایش تا ۲۰ نتیجه همزمان)</label>
      <input type="text" id="searchInput" placeholder="نام یا یوزرنیم مورد نظر را برای جستجو تایپ کنید..." autocomplete="off" />
      <div id="searchDropdown" class="search-dropdown"></div>
    </div>

    <div class="field-group">
      <label data-i18n="blockModeLabel">نوع داده ورودی</label>
      <select id="blockModeSelect">
        <option value="username" data-i18n="blockModeUsername">بر اساس یوزرنیم</option>
        <option value="xid" data-i18n="blockModeXid">بر اساس X ID (آیدی عددی)</option>
      </select>
    </div>

    <div class="field-group">
      <label data-i18n="listLabel">لیست نهایی یوزرنیم‌ها برای بلاک</label>
      <textarea id="listInput" placeholder="هر آیدی یا یوزرنیم در یک خط جدید..."></textarea>
    </div>

    <div class="row">
      <div>
        <label data-i18n="importLabel">ایمپورت فایل آیدی‌ها (TXT)</label>
        <div class="file-input-wrapper">
          <span class="btn-file" data-i18n="chooseFile">انتخاب فایل متنی لیست...</span>
          <input type="file" id="fileInput" accept=".txt" />
        </div>
      </div>
      <div>
        <label data-i18n="delayLabel">میزان تاخیر بین هر بلاک (ثانیه)</label>
        <input type="number" id="delayInput" value="7" min="2" />
      </div>
    </div>

    <div id="previewBox" class="preview-box"></div>

    <button id="previewBtn" class="btn-secondary" type="button" data-i18n="previewBtn">پیش‌نمایش قبل از شروع</button>
    <button id="startBtn" class="btn" type="button" data-i18n="startBtn">شروع عملیات بلاک دسته‌جمعی</button>
    <button id="clearBlockDataBtn" class="btn-secondary" type="button" data-i18n="clearDataBtn">پاک کردن داده‌ها</button>
    </div>

    <div id="tabUnblockPanel" style="display:none">
      <div class="field-group">
        <label data-i18n="unblockModeLabel">نوع داده ورودی</label>
        <select id="unblockModeSelect">
          <option value="username" data-i18n="blockModeUsername">بر اساس یوزرنیم</option>
          <option value="xid" data-i18n="blockModeXid">بر اساس X ID (آیدی عددی)</option>
        </select>
      </div>

      <div class="field-group">
        <label data-i18n="unblockListLabel">لیست یوزرنیم‌ها/آیدی‌ها برای آنبلاک</label>
        <textarea id="unblockListInput" placeholder="هر آیدی یا یوزرنیم در یک خط جدید..."></textarea>
      </div>

      <div class="row">
        <div>
          <label data-i18n="importLabel">ایمپورت فایل آیدی‌ها (TXT)</label>
          <div class="file-input-wrapper">
            <span class="btn-file" data-i18n="chooseFile">انتخاب فایل متنی لیست...</span>
            <input type="file" id="unblockFileInput" accept=".txt" />
          </div>
        </div>
        <div>
          <label data-i18n="delayLabel">میزان تاخیر بین هر آنبلاک (ثانیه)</label>
          <input type="number" id="unblockDelayInput" value="7" min="2" />
        </div>
      </div>

      <div id="unblockPreviewBox" class="preview-box"></div>

      <button id="unblockPreviewBtn" class="btn-secondary" type="button" data-i18n="previewBtn">پیش‌نمایش قبل از شروع</button>
      <button id="unblockStartBtn" class="btn" type="button" data-i18n="unblockStartBtn">شروع عملیات آنبلاک دسته‌جمعی</button>
      <button id="clearUnblockDataBtn" class="btn-secondary" type="button" data-i18n="clearDataBtn">پاک کردن داده‌ها</button>
    </div>

    <div id="tabIdFinderPanel" style="display:none">
      <div class="field-group">
        <label data-i18n="idFinderLabel">یوزرنیم را وارد کنید تا آیدی عددی (X ID) آن را دریافت کنید</label>
        <div class="idfinder-row">
          <input type="text" id="idFinderInput" placeholder="مثال: elonmusk" autocomplete="off" />
          <button id="idFinderBtn" type="button" data-i18n="idFinderBtn">دریافت آیدی</button>
        </div>
      </div>
      <div id="idFinderResult" class="idfinder-result"></div>
      <button id="clearIdFinderDataBtn" class="btn-secondary" type="button" data-i18n="clearDataBtn">پاک کردن داده‌ها</button>
    </div>

    <div id="tabBlockedListPanel" style="display:none">
      <div class="field-group">
        <label data-i18n="blockedListLabel">لیست کامل اکانت‌هایی که تا الان بلاک کرده‌اید</label>
        <div id="blockedListStatus" class="blockedlist-status"></div>
      </div>
      <button id="fetchBlockedListBtn" class="btn" type="button" data-i18n="fetchBlockedListBtn">دریافت لیست بلاک‌شده‌ها</button>
      <button id="exportBlockedListBtn" class="btn-secondary" type="button" style="display:none" data-i18n="exportCsvBtn">دانلود به‌صورت CSV</button>

      <div id="blockedListToolbar" class="blockedlist-toolbar" style="display:none; margin-top:14px;">
        <input type="text" id="blockedListSearchInput" data-i18n-placeholder="blockedListSearchPlaceholder" placeholder="جستجو بر اساس نام، یوزرنیم یا بیو..." />
      </div>
      <button id="unblockSelectedBtn" class="btn-outline-danger" type="button" style="display:none" data-i18n="unblockSelectedBtn">آنبلاک انتخاب‌شده‌ها</button>

      <div id="blockedListTableWrapper" class="blockedlist-table-wrapper" style="display:none">
        <table id="blockedListTable" class="blockedlist-table">
          <thead>
            <tr>
              <th style="width:26px;"><input type="checkbox" id="blockedListSelectAll" /></th>
              <th data-sort-key="name" data-i18n="idFinderName">نام</th>
              <th data-sort-key="screen_name" data-i18n="idFinderUsername">یوزرنیم</th>
              <th data-sort-key="id_str" data-i18n="idFinderId">آیدی عددی (X ID)</th>
              <th data-sort-key="description" data-i18n="blockedListBio">بیو</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <button id="clearBlockedListDataBtn" class="btn-secondary" type="button" data-i18n="clearDataBtn">پاک کردن داده‌ها</button>
    </div>

    <div id="tabSettingsPanel" style="display:none">
      <h3 data-i18n="settingsAppearance">ظاهر</h3>
      <div class="settings-row">
        <label data-i18n="settingsTheme">تم برنامه</label>
        <select id="settingsThemeSelect">
          <option value="light" data-i18n="settingsThemeLight">روشن</option>
          <option value="dark" data-i18n="settingsThemeDark">تیره</option>
        </select>
      </div>

      <h3 data-i18n="settingsResumeHeading">ازسرگیری بعد از رفرش صفحه</h3>
      <div class="settings-row">
        <label data-i18n="settingsResumeLabel">وقتی عملیات نیمه‌تمام پیدا شود</label>
        <select id="settingsResumeSelect">
          <option value="ask" data-i18n="settingsResumeAsk">هر بار بپرس</option>
          <option value="auto" data-i18n="settingsResumeAuto">خودکار ادامه بده</option>
          <option value="never" data-i18n="settingsResumeNever">هیچ‌وقت ادامه نده</option>
        </select>
      </div>

      <h3 data-i18n="settingsSafetyHeading">ایمنی عملیات بلاک</h3>
      <div class="checkbox-row">
        <input type="checkbox" id="settingsNotifyFollow" />
        <label for="settingsNotifyFollow" data-i18n="settingsNotifyFollowLabel">قبل از بلاک دنبال‌کننده‌ها/دنبال‌شونده‌ها هشدار بده</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="settingsNotifyComplete" />
        <label for="settingsNotifyComplete" data-i18n="settingsNotifyCompleteLabel">اعلان دسکتاپ بعد از پایان عملیات</label>
      </div>

      <h3 data-i18n="settingsWhitelistHeading">لیست استثنا (هیچ‌وقت بلاک نشوند)</h3>
      <div class="field-group">
        <label data-i18n="settingsWhitelistLabel">هر یوزرنیم یا X ID در یک خط جدید</label>
        <textarea id="settingsWhitelistInput" style="height:110px;" placeholder="username1&#10;username2&#10;1234567890"></textarea>
      </div>

      <button id="settingsSaveBtn" class="btn" type="button" data-i18n="settingsSaveBtn">ذخیره تنظیمات</button>
      <div id="settingsSavedNote" class="settings-saved-note"></div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
